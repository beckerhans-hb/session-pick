<title>SessionPick · 42nd ISE Topical Meeting</title>
<style>
  :root{
    --bg:#F5F7F8; --surface:#FFFFFF; --surface-2:#EEF2F4; --surface-3:#E4EBED;
    --ink:#10242B; --ink-soft:#4A5E66; --ink-faint:#86969C; --line:#DCE4E7;
    --primary:#0B5563; --primary-deep:#073B45; --primary-soft:#E1EDEF;
    --charge:#1FA85C; --charge-soft:#E4F4EB; --charge-ink:#127A41;
    --amber:#C98A00; --amber-soft:#FBF1D9;
    --alert:#D64535; --alert-soft:#FBE6E2;
    --skip:#94A4AA;
    --cat-elec:#1FA85C; --cat-batt:#2E6FB0; --cat-rfb:#8254C8; --cat-other:#8A9AA0;
    --radius:14px; --radius-sm:10px;
    --tap:44px;
    --fz:16px;
    font-size:var(--fz);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.4; overscroll-behavior-y:none;
  }
  .serif{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit;}
  ::-webkit-scrollbar{display:none;}

  /* ---------- shell ---------- */
  #app{max-width:520px; margin:0 auto; min-height:100vh; position:relative;}
  .appbar{
    position:sticky; top:0; z-index:40; background:var(--primary);
    color:#fff; padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display:flex; align-items:flex-start; gap:10px;
    box-shadow:0 1px 0 rgba(0,0,0,.04);
  }
  .wordmark-block{display:flex; flex-direction:column; gap:1px; min-width:0;}
  .wordmark{font-size:1.22rem; font-weight:600; letter-spacing:.2px; line-height:1.15; display:flex; align-items:center; gap:8px;}
  .wordmark .bolt{color:var(--charge);}
  .logomark{flex:0 0 auto; width:26px; height:26px; border-radius:7px; background:rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center;}
  .logomark svg{width:16px;height:16px;}
  .eventline{
    font-size:.7rem; font-weight:500; color:#BFDCE0; letter-spacing:.1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .appbar .spacer{flex:1;}
  .iconbtn{
    width:38px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    color:#fff; background:rgba(255,255,255,.12); font-weight:600; font-size:.82rem; gap:3px;
    flex:0 0 auto; margin-top:1px;
  }
  .iconbtn.on{background:var(--charge); color:#06251A;}
  .iconbtn svg{width:18px;height:18px;}
  .subbar{background:var(--primary); color:#cfe3e6; padding:0 16px calc(10px); font-size:.72rem;}

  /* ---------- day pills ---------- */
  .daystrip{
    background:var(--bg);
    padding:10px 12px 8px; display:flex; gap:7px; overflow-x:auto;
    border-bottom:1px solid var(--line);
  }
  .daystrip.under{top:0;}
  .pill{
    flex:0 0 auto; padding:8px 13px; border-radius:999px; background:var(--surface);
    border:1px solid var(--line); font-size:.82rem; font-weight:500; color:var(--ink-soft);
    white-space:nowrap; min-height:var(--tap); display:flex;align-items:center;
  }
  .pill .d-day{font-weight:600; color:var(--ink);}
  .pill.active{background:var(--primary); border-color:var(--primary); color:#fff;}
  .pill.active .d-day{color:#fff;}
  .pill .cnt{margin-left:6px; font-size:.7rem; opacity:.7;}

  /* ---------- content ---------- */
  main{padding:12px 12px 96px;}
  .screen-eyebrow{
    font-family:Georgia,serif; font-style:italic; color:var(--ink-faint);
    font-size:.8rem; margin:4px 2px 10px;
  }
  .empty{
    text-align:center; color:var(--ink-faint); padding:48px 24px; font-size:.9rem;
  }
  .empty b{display:block; color:var(--ink-soft); font-size:1rem; margin-bottom:6px;}

  /* ---------- Today landing header ---------- */
  .today{
    background:linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
    border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; color:#fff;
  }
  .today .t-date{font-family:Georgia,serif; font-size:1.02rem; font-weight:700;}
  .today .t-sub{font-size:.74rem; color:#BFDCE0; margin-top:2px;}
  .today .t-now{
    margin-top:12px; background:rgba(255,255,255,.1); border-radius:10px; padding:10px 12px;
  }
  .today .t-now .lbl{font-size:.62rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--charge); display:flex; align-items:center; gap:5px;}
  .today .t-now .lbl .dot{width:6px;height:6px;border-radius:50%;background:var(--charge);}
  .today .t-now .title{font-size:.86rem; font-weight:600; margin-top:4px; line-height:1.32;}
  .today .t-now .meta{font-size:.72rem; color:#CFE3E6; margin-top:3px;}
  .today .t-row{display:flex; gap:8px; margin-top:12px;}
  .today .t-stat{flex:1; background:rgba(255,255,255,.1); border-radius:9px; padding:8px; text-align:center;}
  .today .t-stat .n{font-size:1.05rem; font-weight:700;}
  .today .t-stat .l{font-size:.62rem; color:#BFDCE0; text-transform:uppercase; letter-spacing:.3px; margin-top:1px;}
  .today .t-stat.warn .n{color:#FFD9CF;}
  .today .t-cta{
    margin-top:10px; display:flex; align-items:center; justify-content:center; gap:6px;
    background:rgba(255,255,255,.14); border-radius:9px; padding:9px; font-size:.78rem; font-weight:600;
  }
  .today .t-cta svg{width:14px;height:14px;}

  /* ---------- session group (Agenda) ---------- */
  .sess{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:12px; overflow:hidden;
  }
  .sess-head{padding:12px 14px; border-bottom:1px solid var(--line); background:var(--surface);}
  .sess-code{
    display:inline-block; font-size:.66rem; font-weight:700; letter-spacing:.5px;
    color:var(--primary); background:var(--primary-soft); padding:2px 7px; border-radius:6px;
    text-transform:uppercase; vertical-align:middle;
  }
  .sess-room{font-size:.72rem; color:var(--ink-faint); margin-left:8px;}
  .sess-title{font-size:.92rem; font-weight:600; margin-top:7px; color:var(--ink); line-height:1.35;}
  .sess-chairs{font-size:.72rem; color:var(--ink-faint); margin-top:4px;}

  /* ---------- talk row ---------- */
  .talk{
    display:flex; gap:11px; padding:11px 14px; border-top:1px solid var(--surface-2);
    position:relative; align-items:flex-start;
  }
  .talk:first-child{border-top:none;}
  .talk .time{
    flex:0 0 auto; width:48px; font-size:.74rem; color:var(--ink-soft); font-weight:600;
    font-variant-numeric:tabular-nums; padding-top:1px;
  }
  .talk .time .to{display:block; color:var(--ink-faint); font-weight:400; font-size:.68rem;}
  .talk .body{flex:1; min-width:0;}
  .talk .t-title{font-size:.9rem; font-weight:500; line-height:1.34; color:var(--ink);}
  .talk .t-pres{font-size:.76rem; color:var(--ink-soft); margin-top:3px;}
  .talk .t-aff{font-size:.71rem; color:var(--ink-faint); margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .talk .t-badges{display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; align-items:center;}
  .badge{font-size:.62rem; font-weight:700; letter-spacing:.4px; padding:2px 6px; border-radius:5px; text-transform:uppercase;}
  .badge.keynote{background:var(--primary); color:#fff;}
  .badge.invited{background:var(--amber-soft); color:var(--amber); border:1px solid #EBD9A8;}
  .badge.bolt{background:var(--charge-soft); color:var(--charge-ink); display:inline-flex;align-items:center;gap:3px;}
  .badge.bolt svg{width:9px;height:9px;}
  .badge.clash{background:var(--alert-soft); color:var(--alert); display:inline-flex;align-items:center;gap:3px;}
  .badge.backup{background:var(--surface-3); color:var(--ink-soft);}

  /* tag indicator strip on left of selected talks */
  .talk.tag-must{background:linear-gradient(90deg,var(--primary-soft) 0 4px,transparent 4px);}
  .talk.tag-interested{background:linear-gradient(90deg,var(--amber) 0 4px,transparent 4px);}
  .talk.tag-skip{opacity:.5;}
  .talk.tag-skip .t-title{text-decoration:line-through; text-decoration-color:var(--skip);}
  .talk.dim{opacity:.34;}

  .talk .chev{flex:0 0 auto; color:var(--ink-faint); align-self:center;}
  .talk .chev svg{width:18px;height:18px;display:block;}
  .tag-dot{position:absolute; right:38px; top:13px;}

  /* quick tag state shown as small pill on right */
  .qtag{flex:0 0 auto; align-self:center; font-size:.64rem; font-weight:700; padding:3px 7px;
    border-radius:6px; text-transform:uppercase; letter-spacing:.3px;}
  .qtag.must{background:var(--primary); color:#fff;}
  .qtag.interested{background:var(--amber); color:#fff;}
  .qtag.skip{background:var(--surface-3); color:var(--ink-soft);}

  .planrow-end{flex:0 0 auto; align-self:center; display:flex; flex-direction:column; align-items:flex-end; gap:6px;}
  .removebtn{
    width:26px; height:26px; border-radius:50%; background:var(--surface-2); color:var(--ink-faint);
    display:flex; align-items:center; justify-content:center;
  }
  .removebtn svg{width:13px;height:13px;}
  .removebtn:active{background:var(--alert-soft); color:var(--alert);}

  /* ---------- By Time (grid) ---------- */
  .slot{margin-bottom:14px;}
  .slot-head{
    display:flex; align-items:center; gap:8px; margin:0 2px 6px;
  }
  .slot-time{
    font-size:.82rem; font-weight:700; color:#fff; background:var(--primary);
    padding:3px 10px; border-radius:7px; font-variant-numeric:tabular-nums;
  }
  .slot-head .rule{flex:1; height:1px; background:var(--line);}
  .slot-head .par{font-size:.68rem; color:var(--ink-faint);}
  .slot-row{display:flex; flex-direction:column; gap:6px;}
  .gcard{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:8px 40px 8px 10px; position:relative; display:flex; align-items:center; gap:9px;
    min-height:0;
  }
  .gcard .g-room{
    flex:0 0 auto; font-size:.66rem; font-weight:700; letter-spacing:.3px; color:var(--primary);
    background:var(--primary-soft); border-radius:6px; padding:3px 6px; text-align:center;
    min-width:30px; line-height:1.15;
  }
  .gcard .g-main{flex:1; min-width:0;}
  .gcard .g-title{
    font-size:.82rem; font-weight:500; line-height:1.28; color:var(--ink);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .gcard .g-pres{font-size:.68rem; color:var(--ink-faint); margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .gcard .g-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
  .gcard.sel{border-color:var(--primary); box-shadow:0 0 0 1.5px var(--primary);}
  .gcard.sel-int{border-color:var(--amber); box-shadow:0 0 0 1.5px var(--amber);}
  .gcard.skip{opacity:.45;}
  .gcard.clash{border-color:var(--alert);}
  .gcard .pickbtn{
    position:absolute; top:50%; right:8px; transform:translateY(-50%);
    width:28px;height:28px;border-radius:50%;
    background:var(--surface-2); display:flex;align-items:center;justify-content:center; color:var(--ink-faint);
  }
  .gcard.sel .pickbtn{background:var(--primary); color:#fff;}
  .gcard .pickbtn svg{width:16px;height:16px;}

  /* ---------- My Plan ---------- */
  .planbanner{
    background:var(--alert-soft); border:1px solid #F1C7C0; border-radius:var(--radius);
    padding:12px 14px; margin-bottom:14px; display:flex; gap:10px; align-items:flex-start;
  }
  .planbanner .ic{flex:0 0 auto; color:var(--alert);}
  .planbanner .ic svg{width:22px;height:22px;}
  .planbanner b{color:var(--alert); font-size:.9rem;}
  .planbanner .clash-item{font-size:.78rem; color:var(--ink-soft); margin-top:6px; line-height:1.4;}
  .planbanner .clash-item .vs{color:var(--alert); font-weight:700;}
  .plan-ok{
    background:var(--charge-soft); border:1px solid #BFE6CE; border-radius:var(--radius);
    padding:12px 14px; margin-bottom:14px; color:var(--charge-ink); font-size:.84rem;
    display:flex; gap:9px; align-items:center;
  }
  .plan-ok svg{width:20px;height:20px;flex:0 0 auto;}
  .plan-day{margin-bottom:6px;}
  .plan-day-h{
    font-family:Georgia,serif; font-size:.84rem; font-weight:700; color:#fff;
    margin:16px 0 8px; padding:7px 12px; background:var(--primary); border-radius:8px;
    display:flex; align-items:center; justify-content:space-between; letter-spacing:.2px;
  }
  .plan-day-h .pcount{font-family:-apple-system,sans-serif; font-weight:600; font-size:.7rem; opacity:.85;}
  .summary{
    display:flex; gap:8px; margin-bottom:6px;
  }
  .stat{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:9px 8px; text-align:center;}
  .stat .n{font-size:1.15rem; font-weight:700; color:var(--primary);}
  .stat .l{font-size:.64rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.4px; margin-top:1px;}
  .exportbar{display:flex; gap:8px; margin:8px 0 14px;}
  .btn{
    flex:1; min-height:var(--tap); border-radius:var(--radius-sm); font-weight:600; font-size:.84rem;
    display:flex;align-items:center;justify-content:center; gap:7px;
  }
  .btn.primary{background:var(--primary); color:#fff;}
  .btn.ghost{background:var(--surface); border:1px solid var(--line); color:var(--ink);}
  .btn svg{width:17px;height:17px;}

  /* ---------- Search ---------- */
  .searchwrap{padding:10px 12px 4px; background:var(--bg); border-bottom:1px solid var(--line);}
  .searchbox{display:flex; align-items:center; gap:8px; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:0 12px; min-height:var(--tap);}
  .searchbox svg{width:18px;height:18px;color:var(--ink-faint);flex:0 0 auto;}
  .searchbox input{flex:1; border:none; outline:none; background:none; font-size:.92rem; color:var(--ink); min-width:0;}
  .searchbox .clr{color:var(--ink-faint); padding:6px;}
  .reslabel{font-size:.74rem; color:var(--ink-faint); margin:10px 2px 8px;}

  /* ---------- bottom sheet (detail) ---------- */
  .scrim{position:fixed; inset:0; background:rgba(8,20,24,.45); z-index:60; opacity:0; pointer-events:none;
    transition:opacity .22s ease;}
  .scrim.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61; background:var(--surface);
    border-radius:20px 20px 0 0; max-width:520px; margin:0 auto;
    transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1);
    max-height:90vh; display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .sheet.show{transform:translateY(0);}
  .sheet .grab{width:38px;height:5px;border-radius:3px;background:var(--surface-3);margin:9px auto 4px;}
  .sheet-scroll{overflow-y:auto; padding:6px 18px 16px;}
  .sheet .s-time{font-size:.78rem; font-weight:600; color:var(--primary); font-variant-numeric:tabular-nums;}
  .sheet .s-meta{font-size:.74rem; color:var(--ink-faint); margin-top:2px;}
  .sheet .s-title{font-size:1.12rem; font-weight:600; line-height:1.3; margin:10px 0; color:var(--ink);}
  .sheet .s-section{font-size:.66rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    color:var(--ink-faint); margin:14px 0 4px;}
  .sheet .s-pres{font-size:.92rem; font-weight:600; color:var(--ink);}
  .sheet .s-aff{font-size:.82rem; color:var(--ink-soft); margin-top:2px; line-height:1.4;}
  .sheet .s-co{font-size:.82rem; color:var(--ink-soft); line-height:1.45;}
  .sheet .s-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .tagrow{display:flex; gap:8px; margin-top:6px;}
  .tagbtn{
    flex:1; min-height:var(--tap); border-radius:var(--radius-sm); font-weight:600; font-size:.82rem;
    border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center; gap:5px;
  }
  .tagbtn.must.on{background:var(--primary); border-color:var(--primary); color:#fff;}
  .tagbtn.interested.on{background:var(--amber); border-color:var(--amber); color:#fff;}
  .tagbtn.skip.on{background:var(--skip); border-color:var(--skip); color:#fff;}
  .backuprow{display:flex; align-items:center; justify-content:space-between; margin-top:14px;
    padding:12px 14px; background:var(--surface-2); border-radius:var(--radius-sm);}
  .backuprow .lbl{font-size:.84rem; font-weight:600; color:var(--ink);}
  .backuprow .sub{font-size:.72rem; color:var(--ink-faint); margin-top:2px;}
  .toggle{width:50px;height:30px;border-radius:999px;background:var(--surface-3); position:relative; flex:0 0 auto; transition:background .18s;}
  .toggle.on{background:var(--charge);}
  .toggle .knob{position:absolute; top:3px; left:3px; width:24px;height:24px;border-radius:50%;background:#fff;
    transition:transform .18s; box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on .knob{transform:translateX(20px);}

  .chip.active.other{background:var(--cat-other);border-color:var(--cat-other);}

  .roomstrip{
    display:flex; flex-wrap:nowrap; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    padding:0 12px 10px; background:var(--bg);
  }
  .rchip{
    flex:0 0 auto; padding:5px 10px; border-radius:8px; background:transparent;

  .rchip.active{background:var(--ink); border-color:var(--ink); color:#fff;}

  .badge.cat{display:inline-flex;align-items:center;gap:4px;color:#fff;}
  .badge.cat .ci{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85);}

  .badge.cat.other{background:var(--cat-other);}

  .maplegend{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);

  .floorcard .fc-title .ln{flex:1;height:1px;background:var(--line);}

  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>

/* ---------------- persistence (localStorage w/ memory fallback) ---------------- */
const store = {
  mem:{},
  _k:'sessionpick_v1',
  load(){
    try{ const r=localStorage.getItem(this._k); return r?JSON.parse(r):null; }
    catch(e){ return this.mem[this._k]||null; }
  },
  save(obj){
    const s=JSON.stringify(obj);
    try{ localStorage.setItem(this._k,s); }catch(e){ this.mem[this._k]=s; }
  }
};

const saved = store.load() || {};
const todayInfo = helsinkiTodayInfo();
const state = {
  tab: 'agenda',
  day: todayInfo.match ? todayInfo.match.name : DATA.days[0].name,
  cat: 'all',
  room: 'all',
  textSize: saved.textSize ?? 0,
  tags: saved.tags || {},        // {talkId: 'must'|'interested'|'skip'}
  backups: new Set(saved.backups || []),
  query: '',
  openTalk: null,
};
const byId = {}; DATA.talks.forEach(t=>byId[t.id]=t);

function persist(){
  store.save({textSize:state.textSize, tags:state.tags, backups:[...state.backups]});
}
function applyTextSize(){
  const sizes=['16px','18px','20.5px'];
  document.documentElement.style.setProperty('--fz', sizes[state.textSize]);
}

/* ---------------- helpers ---------------- */
function tmin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function overlaps(a,b){ return a.dayName===b.dayName && tmin(a.start)<tmin(b.end) && tmin(b.start)<tmin(a.end); }

// Helsinki is UTC+3 (EEST) in June regardless of the device's own timezone —
// this matters because a traveller's phone may still be on home time.
function helsinkiNow(){
  const utcMs = Date.now() + (new Date().getTimezoneOffset()*60000);
  return new Date(utcMs + 3*3600000);
}
function helsinkiTodayInfo(){
  const now = helsinkiNow();
  const y=now.getFullYear(), mo=now.getMonth()+1, da=now.getDate();
  const match = DATA.days.find(d=>d.date===da && mo===6 && y===2026);
  const mins = now.getHours()*60+now.getMinutes();
  return { match, mins, now, dateNum:da, beforeConf: !match && da<23 && mo<=6 && y<=2026, afterConf: !match && (da>26 || mo>6 || y>2026) };
}
function tagOf(id){ return state.tags[id]||null; }
function plannedTalks(){ return DATA.talks.filter(t=>['must','interested'].includes(tagOf(t.id))); }
function mustTalks(){ return DATA.talks.filter(t=>tagOf(t.id)==='must'); }

// hard clashes: pairs of MUST talks that overlap
function hardClashes(){
  const m=mustTalks(); const out=[];
  for(let i=0;i<m.length;i++) for(let j=i+1;j<m.length;j++)
    if(m[i].id!==m[j].id && overlaps(m[i],m[j])) out.push([m[i],m[j]]);
  return out;
}
function talkClashes(t){ // does this MUST talk overlap another MUST talk?
  if(tagOf(t.id)!=='must') return false;
  return mustTalks().some(o=>o.id!==t.id && overlaps(t,o));
}

function toast(msg){

/* ---------------- Today landing header ---------------- */
function renderTodayHeader(){
  const info = helsinkiTodayInfo();
  const allMust = mustTalks().length;
  const allClashes = hardClashes().length;

  // After the conference: header quietly steps aside, Agenda behaves as plain browsing.
  if(info.afterConf) return '';

  // Before the conference: countdown, no "right now" block (nothing is live yet).
  if(info.beforeConf){
    const start = new Date(Date.UTC(2026,5,23,0,0,0) - 3*3600000); // 23 June 00:00 Helsinki
    const daysLeft = Math.max(1, Math.ceil((start - info.now) / 86400000));
    return `<div class="today">
      <div class="t-date">Conference starts in ${daysLeft} day${daysLeft>1?'s':''}</div>
      <div class="t-sub">23–26 June 2026 · Aalto University, Helsinki</div>
      <div class="t-row">
        <div class="t-stat"><div class="n">${allMust}</div><div class="l">Must attend</div></div>
        <div class="t-stat ${allClashes?'warn':''}"><div class="n">${allClashes}</div><div class="l">Clashes</div></div>
      </div>
      ${allMust>0?`<button class="t-cta" data-tab="plan">${ICON.check} Review my plan</button>`:''}
    </div>`;
  }

  // During the conference (today matches a conference day): live "right now / up next".
  if(!info.match) return '';
  const dayIdx = DATA.days.findIndex(d=>d.name===info.match.name);
  const todays = DATA.talks.filter(t=>t.dayName===info.match.name);
  const live = todays.filter(t=>info.mins>=tmin(t.start) && info.mins<tmin(t.end));
  const upcoming = todays.filter(t=>tmin(t.start)>info.mins).sort((a,b)=>tmin(a.start)-tmin(b.start));
  const nextSlotTime = upcoming.length?upcoming[0].start:null;
  const nextSlot = nextSlotTime?todays.filter(t=>t.start===nextSlotTime):[];

  const myLive = live.filter(t=>['must','interested'].includes(tagOf(t.id)));
  const showSet = myLive.length?myLive:live;

  const todayMust = todays.filter(t=>tagOf(t.id)==='must').length;
  const todayClashes = hardClashes().filter(([a,b])=>a.dayName===info.match.name).length;

  let nowBlock='';
  if(showSet.length){
    const t=showSet[0];
    const extra=showSet.length-1;
    nowBlock=`<div class="t-now">
      <div class="lbl"><span class="dot"></span>Happening now</div>
      <div class="title">${esc(t.title)}</div>
      <div class="meta">${esc(t.room)} · ${esc(t.presenter)}${extra>0?` · +${extra} more now`:''}</div>
    </div>`;
  } else if(nextSlot.length){
    const t=nextSlot[0];
    const extra=nextSlot.length-1;
    nowBlock=`<div class="t-now">
      <div class="lbl"><span class="dot"></span>Up next · ${esc(nextSlotTime)}</div>
      <div class="title">${esc(t.title)}</div>
      <div class="meta">${esc(t.room)} · ${esc(t.presenter)}${extra>0?` · +${extra} more`:''}</div>
    </div>`;
  } else {
    nowBlock=`<div class="t-now"><div class="lbl"><span class="dot"></span>Day wrapped up</div><div class="title">No more sessions today — see you tomorrow.</div></div>`;
  }

  return `<div class="today">
    <div class="t-date">${esc(info.match.label)} — Day ${dayIdx+1} of ${DATA.days.length}</div>
    <div class="t-sub">Aalto University, Helsinki</div>
    ${nowBlock}
    <div class="t-row">
      <div class="t-stat"><div class="n">${todayMust}</div><div class="l">Must today</div></div>
      <div class="t-stat ${todayClashes?'warn':''}"><div class="n">${todayClashes}</div><div class="l">Clashes</div></div>
    </div>
    ${todayClashes>0?`<button class="t-cta" data-tab="plan">${ICON.warn} Resolve clashes</button>`:''}
  </div>`;
}

/* ---------------- badges ---------------- */
const CATMETA={
  electrolyser:{label:'Electrolyser',cls:'electrolyser',bolt:true},
  batteries:{label:'Battery',cls:'batteries'},
  rfb:{label:'Redox flow',cls:'rfb'},
  other:{label:'Other',cls:'other'},
};
function catBadge(t){
  const c=CATMETA[t.cat]||CATMETA.other;
  return `<span class="badge cat ${c.cls}">${c.bolt?ICON.bolt:'<span class="ci"></span>'}${c.label}</span>`;
}
function talkBadges(t,{showClash=true,showCat=true}={}){
  let h='';
  if(showCat) h+=catBadge(t);
  if(t.tag==='Keynote') h+='<span class="badge keynote">Keynote</span>';
  if(t.tag==='Invited') h+='<span class="badge invited">Invited</span>';
  if(state.backups.has(t.id)) h+='<span class="badge backup">Backup</span>';
  if(showClash && talkClashes(t)) h+=`<span class="badge clash">${ICON.warn}Clash</span>`;
  return h;
}

/* ---------------- Agenda view ---------------- */
function renderAgenda(){
  const day=state.day;
  let talks=DATA.talks.filter(t=>t.dayName===day);
  if(state.cat!=='all') talks=talks.filter(t=>t.cat===state.cat);
  if(state.room!=='all') talks=talks.filter(t=>t.room===state.room);
  // group by session (code+title+room) preserving time order
  const groups=[]; const idx={};
  talks.forEach(t=>{
    const key=t.sessionCode+'|'+t.room+'|'+t.start.slice(0,2); // session instance
    const gk=t.sessionCode+'|'+t.sessionTitle+'|'+t.room;
    if(!(gk in idx)){ idx[gk]=groups.length; groups.push({code:t.sessionCode,title:t.sessionTitle,room:t.room,chairs:t.chairs,talks:[]}); }
    groups[idx[gk]].talks.push(t);
  });
  groups.forEach(g=>g.talks.sort((a,b)=>tmin(a.start)-tmin(b.start)));
  groups.sort((a,b)=>tmin(a.talks[0].start)-tmin(b.talks[0].start) || a.room.localeCompare(b.room));

  // Today header: only on an unfiltered view, and only when relevant to the day being shown
  // (pre-conference countdown isn't day-specific; live "today" block only on today's own pill).
  let todayHtml='';
  if(state.cat==='all' && state.room==='all'){
    const info = helsinkiTodayInfo();
    if(info.beforeConf || (info.match && info.match.name===day)) todayHtml=renderTodayHeader();
  }

  if(!groups.length) return todayHtml+emptyState('No talks match','No '+(CATMETA[state.cat]?CATMETA[state.cat].label.toLowerCase():'')+' talks match this filter on this day. Try another category, venue, or day.');

  let h=todayHtml+`<div class="screen-eyebrow">${state.cat==='all'?'Full programme':CATMETA[state.cat].label}${state.room!=='all'?' · '+esc(state.room):''} · ${groups.length} session${groups.length>1?'s':''}</div>`;
  groups.forEach(g=>{
    h+=`<div class="sess"><div class="sess-head">
      <div><span class="sess-code">${esc(g.code)}</span><span class="sess-room">${esc(g.room)}</span></div>
      <div class="sess-title">${esc(g.title)}</div>
      ${g.chairs?`<div class="sess-chairs">Chaired by ${esc(g.chairs)}</div>`:''}
    </div>`;
    g.talks.forEach(t=>{ h+=talkRow(t); });
    h+=`</div>`;
  });
  return h;
}

function talkRow(t){
  const tag=tagOf(t.id);
  const qt = tag?`<div class="qtag ${tag}">${tag==='must'?'Must':tag==='interested'?'Maybe':'Skip'}</div>`:`<div class="chev">${ICON.chev}</div>`;
  return `<div class="talk ${tag?('tag-'+tag):''}" data-talk="${t.id}">
    <div class="time">${t.start}<span class="to">${t.end}</span></div>
    <div class="body">
      <div class="t-title">${esc(t.title)}</div>
      <div class="t-pres">${esc(t.presenter)}</div>
      <div class="t-aff">${esc(t.affiliation)}</div>
      ${(()=>{const b=talkBadges(t);return b?`<div class="t-badges">${b}</div>`:'';})()}
    </div>
    ${qt}
  </div>`;
}

/* ---------------- By Time (grid) ---------------- */
function renderGrid(){
  const day=state.day;
  let talks=DATA.talks.filter(t=>t.dayName===day);
  if(state.room!=='all') talks=talks.filter(t=>t.room===state.room);
  if(state.cat!=='all' && !talks.some(t=>t.cat===state.cat))
    return emptyState('No talks match','No '+CATMETA[state.cat].label.toLowerCase()+' talks on this day. Try another category, venue, or day.');
  if(!talks.length) return emptyState('No talks match','No talks for this venue on this day. Try another venue.');
  // group by start time
  const slots={};
  talks.forEach(t=>{ (slots[t.start]=slots[t.start]||[]).push(t); });
  const times=Object.keys(slots).sort((a,b)=>tmin(a)-tmin(b));
  if(!times.length) return emptyState('Nothing scheduled','No sessions for this day.');

  let h=`<div class="screen-eyebrow">Parallel sessions · tap a row to view & pick</div>`;
  times.forEach(tm=>{
    let cards=slots[tm].slice().sort((a,b)=>DATA.rooms.indexOf(a.room)-DATA.rooms.indexOf(b.room));
    if(state.cat!=='all'){ const f=cards.filter(c=>c.cat===state.cat); if(f.length) cards=f; else return; }
    h+=`<div class="slot"><div class="slot-head"><span class="slot-time">${tm}</span><div class="rule"></div><span class="par">${cards.length} room${cards.length>1?'s':''}</span></div>
      <div class="slot-row">`;
    cards.forEach(t=>{
      const tag=tagOf(t.id);
      let cls='gcard';
      if(tag==='must') cls+=' sel';
      else if(tag==='interested') cls+=' sel-int';
      else if(tag==='skip') cls+=' skip';
      if(talkClashes(t)) cls+=' clash';
      const picked = tag==='must';
      h+=`<div class="${cls}" data-talk="${t.id}">
        <button class="pickbtn" data-pick="${t.id}">${picked?ICON.check:ICON.plus}</button>
        <div class="g-room">${esc(shortRoom(t.room))}</div>
        <div class="g-main">
          <div class="g-title">${esc(t.title)}</div>
          <div class="g-pres">${esc(t.presenter)}</div>
          ${(()=>{const b=talkBadges(t);return b?`<div class="g-badges">${b}</div>`:'';})()}
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

/* ---------------- My Plan ---------------- */
function renderPlan(){
  const planned=plannedTalks().slice().sort((a,b)=>a.dayOrder-b.dayOrder||tmin(a.start)-tmin(b.start));
  const clashes=hardClashes();
  const mustN=mustTalks().length, intN=planned.length-mustN, backN=state.backups.size;

  if(!planned.length && !backN)
    return emptyState('Your plan is empty','Browse the Agenda or By Time view and tag talks as “Must attend” or “Interested”. They’ll gather here.');

  let h='';
  // banner
  if(clashes.length){
    h+=`<div class="planbanner"><div class="ic">${ICON.warn}</div><div style="flex:1">
      <b>${clashes.length} time clash${clashes.length>1?'es':''} in your must-attend talks</b>`;
    clashes.slice(0,6).forEach(([a,b])=>{
      h+=`<div class="clash-item">${esc(a.dayName.slice(0,3))} ${a.start} — <b>${esc(shortRoom(a.room))}</b>: ${esc(clip(a.title,46))} <span class="vs">vs</span> <b>${esc(shortRoom(b.room))}</b>: ${esc(clip(b.title,46))}</div>`;
    });
    h+=`</div></div>`;
  } else if(mustN>0){
    h+=`<div class="plan-ok">${ICON.check}<div>No clashes — your must-attend schedule is conflict-free.</div></div>`;
  }
  // summary
  h+=`<div class="summary">
    <div class="stat"><div class="n">${mustN}</div><div class="l">Must attend</div></div>
    <div class="stat"><div class="n">${intN}</div><div class="l">Interested</div></div>
    <div class="stat"><div class="n">${backN}</div><div class="l">Backups</div></div>
  </div>
  <div class="exportbar">
    <button class="btn primary" id="shareBtn">${ICON.share}Share plan</button>
    <button class="btn ghost" id="copyBtn">${ICON.copy}Copy text</button>
  </div>`;

  // group by day
  const days=[...new Set(planned.map(t=>t.dayName))];
  days.forEach(dn=>{
    const dt=planned.filter(t=>t.dayName===dn);
    const dd=DATA.days.find(d=>d.name===dn);
    h+=`<div class="plan-day-h serif"><span>${esc(dd.label)}</span><span class="pcount">${dt.length} talk${dt.length>1?'s':''}</span></div>`;
    dt.forEach(t=>{ h+=planRow(t); });
  });
  // backups not already in plan
  const extraBackups=[...state.backups].map(id=>byId[id]).filter(t=>t&&!['must','interested'].includes(tagOf(t.id)));
  if(extraBackups.length){
    h+=`<div class="plan-day-h serif" style="background:var(--ink-faint)"><span>Backup options</span><span class="pcount">${extraBackups.length}</span></div>`;
    extraBackups.sort((a,b)=>a.dayOrder-b.dayOrder||tmin(a.start)-tmin(b.start)).forEach(t=>{ h+=planRow(t); });
  }
  return h;
}
function planRow(t){
  const tag=tagOf(t.id);
  const clash=talkClashes(t);
  return `<div class="talk ${tag?('tag-'+tag):''}" data-talk="${t.id}" style="background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;border-top:1px solid var(--line)">
    <div class="time">${t.start}<span class="to">${esc(t.dayName.slice(0,3))}</span></div>
    <div class="body">
      <div class="t-title">${esc(t.title)}</div>
      <div class="t-pres">${esc(t.room)} · ${esc(t.presenter)}</div>
      ${(()=>{let b='';if(t.tag==='Keynote')b+='<span class="badge keynote">Keynote</span>';if(t.tag==='Invited')b+='<span class="badge invited">Invited</span>';if(t.rel>=6)b+=`<span class="badge bolt">${ICON.bolt}Electrolyser</span>`;if(state.backups.has(t.id))b+='<span class="badge backup">Backup</span>';if(clash)b+=`<span class="badge clash">${ICON.warn}Clash</span>`;return b?`<div class="t-badges">${b}</div>`:'';})()}
    </div>
    <div class="planrow-end">
      <div class="qtag ${tag||'skip'}">${tag==='must'?'Must':tag==='interested'?'Maybe':'Backup'}</div>
      <button class="removebtn" data-remove="${t.id}" title="Remove from plan" aria-label="Remove from plan">${ICON.x}</button>
    </div>
  </div>`;
}
function shortRoom(r){ return r.replace('Hall ','').replace('/C',''); }
function clip(s,n){ return s.length>n?s.slice(0,n-1)+'…':s; }

/* ---------------- Search ---------------- */
function renderSearch(){
  const q=state.query.trim().toLowerCase();
  let results=[];
  if(q.length>=2){
    results=DATA.talks.filter(t=>{
      const hay=(t.title+' '+t.presenter+' '+t.affiliation+' '+t.coauthors+' '+t.sessionTitle+' '+t.room).toLowerCase();
      return q.split(/\s+/).every(w=>hay.includes(w));
    });
    if(state.cat!=='all') results=results.filter(t=>t.cat===state.cat);
    if(state.room!=='all') results=results.filter(t=>t.room===state.room);
    results.sort((a,b)=>b.rel-a.rel || a.dayOrder-b.dayOrder || tmin(a.start)-tmin(b.start));
  }
  let h='';
  if(q.length<2){
    h+=`<div class="empty"><b>Search the programme</b>Find talks by title, speaker, institution, or topic — try “iridium”, “AEM”, “solid electrolyte”, or a presenter’s name.</div>`;
  } else if(!results.length){
    h+=`<div class="empty"><b>No matches for “${esc(state.query)}”</b>Check spelling or try a broader term.</div>`;
  } else {
    h+=`<div class="reslabel">${results.length} result${results.length>1?'s':''} for “${esc(state.query)}”</div>`;
    results.forEach(t=>{
      const tag=tagOf(t.id);
      const qt = tag?`<div class="qtag ${tag}">${tag==='must'?'Must':tag==='interested'?'Maybe':'Skip'}</div>`:`<div class="chev">${ICON.chev}</div>`;
      h+=`<div class="talk ${tag?('tag-'+tag):''}" data-talk="${t.id}" style="background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px">
        <div class="time">${t.start}<span class="to">${t.dayName.slice(0,3)}</span></div>
        <div class="body">
          <div class="t-title">${esc(t.title)}</div>
          <div class="t-pres">${esc(t.presenter)}</div>
          <div class="t-aff">${esc(t.room)} · ${esc(t.affiliation)}</div>
          ${(()=>{const b=talkBadges(t);return b?`<div class="t-badges">${b}</div>`:'';})()}
        </div>${qt}
      </div>`;
    });
  }
  return h;
}

function emptyState(title,sub){ return `<div class="empty"><b>${esc(title)}</b>${esc(sub)}</div>`; }

/* ---------------- detail sheet ---------------- */
function openSheet(id){
  const t=byId[id]; if(!t) return; state.openTalk=id;
  const tag=tagOf(id); const isBackup=state.backups.has(id);
  const clash=talkClashes(t);
  const co=t.coauthors?t.coauthors:'';
  const absUrl=t.absUrl||('https://www.google.com/search?q='+encodeURIComponent(t.title+' electrochemistry abstract'));
  let h=`<div class="s-time">${esc(t.dayName)} ${t.start}–${t.end} · ${esc(t.room)}</div>
    <div class="s-meta">${esc(t.sessionCode)} · ${esc(t.sessionTitle)}</div>
    <div class="s-title">${esc(t.title)}</div>`;

  if(t.tag==='Keynote')b+='<span class="badge keynote">Keynote</span>';
  if(t.tag==='Invited')b+='<span class="badge invited">Invited</span>';
  if(t.rel>=6)b+=`<span class="badge bolt">${ICON.bolt}Electrolyser-relevant</span>`;
  else if(t.rel>=3)b+=`<span class="badge bolt" style="opacity:.7">${ICON.bolt}Some relevance</span>`;

  if(clash){

  }

  h+=`<div class="s-section">Add to my plan</div>

      <div><div class="lbl">Mark as backup</div><div class="sub">A fallback if your first choice is full</div></div>
      <div class="toggle ${isBackup?'on':''}" data-backup="1"><div class="knob"></div></div>
    </div>`;

  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').classList.add('show');
  document.getElementById('scrim').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('scrim').classList.remove('show');
  state.openTalk=null;
}
function setTag(id,tag){
  if(state.tags[id]===tag) delete state.tags[id]; else state.tags[id]=tag;
  persist();
}
function toggleBackup(id){
  if(state.backups.has(id)) state.backups.delete(id); else state.backups.add(id);
  persist();
}
function removeFromPlan(id){
  delete state.tags[id];
  state.backups.delete(id);
  persist();
}

/* ---------------- chrome render ---------------- */
function catColor(k){return {electrolyser:'var(--cat-elec)',batteries:'var(--cat-batt)',rfb:'var(--cat-rfb)',other:'var(--cat-other)'}[k]||'var(--ink-faint)';}
function catChips(){
  const scope = (state.tab==='search') ? DATA.talks : DATA.talks.filter(t=>t.dayName===state.day);
  const counts={all:scope.length,electrolyser:0,batteries:0,rfb:0,other:0};
  scope.forEach(t=>{counts[t.cat]=(counts[t.cat]||0)+1;});
  const items=[{k:'all',label:'All'},{k:'electrolyser',label:'Electrolyser'},{k:'batteries',label:'Batteries'},{k:'rfb',label:'Redox'},{k:'other',label:'Other'}];
  return `<div class="catstrip">`+items.map(it=>{
    const active=state.cat===it.k;
    const dot = it.k==='all'?'':`<span class="ci" style="background:${active?'rgba(255,255,255,.92)':catColor(it.k)}"></span>`;
    return `<button class="chip ${it.k} ${active?'active':''}" data-cat="${it.k}">${dot}${it.label}<span class="cnt">${counts[it.k]||0}</span></button>`;
  }).join('')+`</div>`;
}
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
function roomChips(){
  const scope = (state.tab==='search') ? DATA.talks : DATA.talks.filter(t=>t.dayName===state.day);
  const present = DATA.rooms.filter(r=>scope.some(t=>t.room===r));
  if(present.length<2) return ''; // nothing to filter on a day with one venue
  const items=[{k:'all',label:'All venues'}, ...present.map(r=>({k:r,label:shortRoom(r)}))];
  return `<div class="roomstrip">`+items.map(it=>{
    const active=state.room===it.k;
    return `<button class="rchip ${active?'active':''}" data-room="${it.k}">${it.k==='all'?PIN:''}${esc(it.label)}</button>`;
  }).join('')+`</div>`;
}

function renderDaystrip(){
  const host=document.getElementById('dayhost');
  if(state.tab==='plan'||state.tab==='map'){ host.innerHTML=''; return; }
  if(state.tab==='search'){
    host.innerHTML=`<div class="searchwrap"><div class="searchbox">${ICON.search}
      <input id="searchInput" type="search" placeholder="Search talks, speakers, topics…" autocomplete="off" value="${esc(state.query)}">
      ${state.query?`<button class="clr" id="searchClear">✕</button>`:''}
    </div></div>`+catChips()+roomChips();
    const inp=document.getElementById('searchInput');
    inp.addEventListener('input',e=>{ state.query=e.target.value; renderMain(); });
    inp.focus();
    const clr=document.getElementById('searchClear');
    if(clr) clr.addEventListener('click',()=>{ state.query=''; renderAll(); });
    return;
  }
  let h=`<div class="daystrip">`;
  DATA.days.forEach(d=>{
    const n=DATA.talks.filter(t=>t.dayName===d.name).length;
    h+=`<button class="pill ${state.day===d.name?'active':''}" data-day="${d.name}">
      <span class="d-day">${d.name.slice(0,3)}</span>&nbsp;${d.date}<span class="cnt">${n}</span></button>`;
  });
  h+=`</div>`+catChips()+roomChips();
  host.innerHTML=h;
}

/* ---------------- Map view ---------------- */
function renderMap(){
  return `<div class="screen-eyebrow">Aalto University · Undergraduate Centre, Otakaari 1</div>
  <div class="maplegend">
    <h3>Where each hall is</h3>
    <div class="floorrow"><span class="fl">1st floor</span><span class="halls"><span class="hallchip">Hall D</span><span class="hallchip">Hall E</span> · registration, coffee, cloakroom</span></div>
    <div class="floorrow"><span class="fl">2nd floor</span><span class="halls"><span class="hallchip">Hall A</span><span class="hallchip">Hall B</span><span class="hallchip">M1 / C</span> · posters, exhibitors, lift</span></div>
  </div>
  <div class="floorcard">
    <div class="fc-title">1st floor — Halls D & E<div class="ln"></div></div>
    <img class="floorimg" src="data:image/jpeg;base64,${FLOOR1}" alt="First floor plan showing Halls D and E, main entrance, registration and coffee">
  </div>
  <div class="floorcard">
    <div class="fc-title">2nd floor — Halls A, B, M1/C<div class="ln"></div></div>
    <img class="floorimg" src="data:image/jpeg;base64,${FLOOR2}" alt="Second floor plan showing Halls A (AALTO), B, C, M1, posters and exhibitors">
  </div>
  <div class="maphint">Pinch to zoom · Halls A (AALTO) and B run all days; M1 or C are used on Thursday</div>`;
}

function renderMain(){
  const m=document.getElementById('main');
  let h='';
  if(state.tab==='agenda') h=renderAgenda();
  else if(state.tab==='grid') h=renderGrid();
  else if(state.tab==='map') h=renderMap();
  else if(state.tab==='plan') h=renderPlan();
  else if(state.tab==='search') h=renderSearch();
  m.innerHTML=h;
}

function renderTabbar(){
  const tb=document.getElementById('tabbar');
  const clashN=hardClashes().length;
  tb.innerHTML=TABS.map(t=>{
    const badge = (t.id==='plan'&&clashN)?`<span class="badge-n">${clashN}</span>`:'';
    return `<button class="tab ${state.tab===t.id?'active':''}" data-tab="${t.id}" style="position:relative">
      ${badge}${t.icon}<span>${t.label}</span></button>`;
  }).join('');
}

function renderSubbar(){
  document.getElementById('subbar').textContent =
    `${DATA.meta.dates} · ${DATA.meta.location} · ${DATA.meta.totalTalks} talks`;
}

function renderAll(){
  renderSubbar(); renderDaystrip(); renderMain(); renderTabbar();
}

/* ---------------- events ---------------- */
document.addEventListener('click',e=>{
  const pick=e.target.closest('[data-pick]');
  if(pick){ e.stopPropagation(); const id=pick.getAttribute('data-pick');
    setTag(id,'must'); // setTag toggles: must -> off, anything else -> must
    renderAll();
    toast(tagOf(id)==='must'?'Added to must-attend':'Removed from plan'); return; }

  const remove=e.target.closest('[data-remove]');
  if(remove){ e.stopPropagation(); const id=remove.getAttribute('data-remove');
    removeFromPlan(id);
    renderAll();
    toast('Removed from plan'); return; }

  const tab=e.target.closest('[data-tab]');
  if(tab){ state.tab=tab.getAttribute('data-tab'); state.query=state.tab==='search'?state.query:state.query; renderAll(); window.scrollTo(0,0); return; }

  const day=e.target.closest('[data-day]');
  if(day){ state.day=day.getAttribute('data-day'); state.room='all'; renderAll(); window.scrollTo(0,0); return; }

  const cat=e.target.closest('[data-cat]');
  if(cat){ state.cat=cat.getAttribute('data-cat'); renderAll(); return; }

  const room=e.target.closest('[data-room]');
  if(room){ state.room=room.getAttribute('data-room'); renderAll(); return; }

  const tagBtn=e.target.closest('[data-tag]');
  if(tagBtn){ const id=state.openTalk; setTag(id,tagBtn.getAttribute('data-tag')); openSheet(id); renderAll(); return; }

  const bk=e.target.closest('[data-backup]');
  if(bk){ const id=state.openTalk; toggleBackup(id); openSheet(id); renderAll(); return; }

  const talk=e.target.closest('[data-talk]');
  if(talk && !e.target.closest('[data-pick]') && !e.target.closest('[data-remove]')){ openSheet(talk.getAttribute('data-talk')); return; }

  if(e.target.id==='shareBtn'){ sharePlan(); return; }
  if(e.target.closest('#shareBtn')){ sharePlan(); return; }
  if(e.target.id==='copyBtn'||e.target.closest('#copyBtn')){ copyPlan(); return; }
});

document.getElementById('scrim').addEventListener('click',closeSheet);
document.getElementById('textBtn').addEventListener('click',()=>{ state.textSize=(state.textSize+1)%3; applyTextSize(); persist(); toast(['Text size: standard','Text size: large','Text size: extra large'][state.textSize]); });

/* ---------------- export ---------------- */
function planText(){
  const planned=plannedTalks().slice().sort((a,b)=>a.dayOrder-b.dayOrder||tmin(a.start)-tmin(b.start));
  if(!planned.length) return 'My SessionPick plan is empty.';
  let out=`My schedule — ${DATA.meta.name}\n${DATA.meta.dates}\n`;
  const days=[...new Set(planned.map(t=>t.dayName))];
  days.forEach(dn=>{
    const dd=DATA.days.find(d=>d.name===dn);
    out+=`\n${dd.label}\n`;
    planned.filter(t=>t.dayName===dn).forEach(t=>{
      const mark=tagOf(t.id)==='must'?'★':'○';
      out+=`  ${mark} ${t.start}–${t.end}  ${t.room}\n     ${t.title}\n     ${t.presenter}\n`;
    });
  });
  const cl=hardClashes();
  if(cl.length) out+=`\n⚠ ${cl.length} time clash(es) to resolve in your must-attend talks.`;
  out+=`\n\n★ Must attend  ○ Interested`;
  return out;
}
async function sharePlan(){
  const text=planText();
  if(navigator.share){ try{ await navigator.share({title:'My SessionPick plan',text}); return; }catch(e){} }
  copyPlan();
}
async function copyPlan(){
  const text=planText();
  try{ await navigator.clipboard.writeText(text); toast('Plan copied to clipboard'); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Plan copied'); }catch(_){ toast('Copy not supported'); }
    document.body.removeChild(ta);
  }
}

/* ---------------- init ---------------- */
applyTextSize();
renderAll();
</script>
